<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NetflixLight — Playlists</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/playlists.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Netflix<span>Light</span></div>
  <a href="index.html" class="btn-retour">← Retour</a>
</div>

<div class="pl-hero">
  <h1 class="pl-title">Mes <span>Playlists</span></h1>
  <button class="pl-create-btn" id="pl-create-btn">+ Créer une playlist</button>
</div>

<!-- Modal création -->
<div class="pl-modal hidden" id="pl-modal">
  <div class="pl-modal-box">
    <h2 class="pl-modal-title">Nouvelle playlist</h2>
    <input type="text" id="pl-name-input" placeholder="Nom de la playlist..." class="pl-input">
    <div class="pl-modal-btns">
      <button class="pl-btn-confirm" id="pl-confirm">Créer</button>
      <button class="pl-btn-cancel" id="pl-cancel">Annuler</button>
    </div>
  </div>
</div>

<div id="playlists-container" class="pl-grid"></div>

<!-- Page détail d'une playlist -->
<div id="pl-detail" class="pl-detail hidden">
  <div class="pl-detail-header">
    <button class="pl-back-btn" id="pl-back">← Retour aux playlists</button>
    <h2 id="pl-detail-title"></h2>
    <button class="pl-delete-pl-btn" id="pl-delete-pl">Supprimer la playlist</button>
  </div>
  <div id="pl-detail-films" class="fav-grid"></div>
  <div class="pl-empty-detail hidden" id="pl-empty-detail">
    <p>Aucun film dans cette playlist.</p>
    <a href="index.html">Ajouter des films</a>
  </div>
</div>

<script src="js/playlists.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Netflix Light</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
    <div class="topbar-logo">Netflix<span>Light</span></div>
    <div id="auth-buttons">
        <div id="user-avatar" class="user-avatar hidden">
            <div class="avatar-circle" id="avatar-letter">?</div>
            <span id="avatar-pseudo" style="cursor:pointer;" onclick="window.location.href='profile.html'"></span>
        </div>
        <span style="color:rgba(255,255,255,0.15); margin:0 6px;">|</span>
        <button id="logout-btn" class="btn-logout hidden">Déconnexion</button>
        <span style="color:rgba(255,255,255,0.15); margin:0 6px;">|</span>
        <a href="login.html">Login</a>
        <span style="color:rgba(255,255,255,0.15); margin:0 6px;">|</span>
        <a href="register.html">Sign up</a>
        <span style="color:rgba(255,255,255,0.15); margin:0 6px;">|</span>
        <a href="favorites.html">Favorites</a>
        <span style="color:rgba(255,255,255,0.15); margin:0 6px;">|</span>
        <a href="playlists.html">Playlists</a>
    </div>
</div>

<div id="hero-banner" class="hero-banner">
    <div class="hero-backdrop" id="hero-backdrop"></div>
    <button class="hero-arrow hero-arrow-left" id="hero-prev">&#8592;</button>
    <button class="hero-arrow hero-arrow-right" id="hero-next">&#8594;</button>
    <div class="hero-content">
        <p class="hero-tag">TENDANCE</p>
        <h1 class="hero-film-title" id="hero-film-title"></h1>
        <p class="hero-synopsis" id="hero-synopsis"></p>
        <div class="hero-meta" id="hero-meta"></div>
        <div class="hero-btns">
            <a class="hero-btn-play" id="hero-btn-play" href="#">▶ Voir le film</a>
            <button class="hero-btn-fav" id="hero-btn-fav">+ Ma liste</button>
        </div>
    </div>
    <div class="hero-trailer" id="hero-trailer"></div>
    <div class="hero-dots" id="hero-dots"></div>
</div>

<div class="search-bar-section">
    <input type="text" id="fav-search" class="fav-search" placeholder="Search for a movie...">
</div>

<div id="films-container"></div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NetflixLight — Favoris</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/favorites.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Netflix<span>Light</span></div>
  <a href="index.html" class="btn-retour">← Back</a>
</div>


<!-- En tête -->
<div class="fav-hero">
  <h1 class="fav-title">My <span>Favorites</span></h1>
  <p id="fav-count">0 film</p>

  <!-- Barre de recherche -->
  <input type="text" id="fav-search" class="fav-search" placeholder="Search for a favorite...">
</div>


<!-- Favories -->

<!-- Rempli automatiquement par favorites.js -->
<div id="favorites-container" class="fav-grid"></div>

<!-- Affiché si la liste est vide -->
<div id="fav-empty" class="fav-empty hidden">
  <div class="fav-empty-icon">♡</div>
  <p>No movies in your favorites.</p>
  <a href="index.html">Browse the films</a>
</div>


<!-- Script -->
<script src="js/favorites.js"></script>

</body>
</html>

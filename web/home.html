<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Netflix Light — Bienvenue</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>

<canvas id="particles"></canvas>

<!-- Logo -->
<div class="welcome-logo">Netflix<span>Light</span></div>

<!-- Version -->
<p class="welcome-version">v1.0.0 — 2026</p>

<div class="welcome-page">

  <!-- Badge -->
  <p class="welcome-badge">✦ Plateforme de streaming ✦</p>

  <!-- Titre -->
  <h1 class="welcome-title">Films Illimités</h1>

  <!-- Sous-titre -->
  <p class="welcome-subtitle">Découvrez les meilleurs films du moment</p>

  <!-- Features -->
  <div class="welcome-features">
    <div class="welcome-feature">
      <span class="feature-icon">🎬</span>
      <p>Des centaines de films</p>
    </div>
    <div class="welcome-feature">
      <span class="feature-icon">⭐</span>
      <p>Les mieux notés</p>
    </div>
    <div class="welcome-feature">
      <span class="feature-icon">🔥</span>
      <p>Les tendances</p>
    </div>
  </div>

  <!-- Bouton -->
  <a href="/films" class="welcome-btn">▶ Découvrir les films</a>

</div>

<script src="js/home.js"></script>

</body>
</html>

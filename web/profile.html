<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Profil</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<!-- ─── BARRE DE NAVIGATION ─────────────────────────── -->
<div class="topbar">
  <div class="topbar-logo">Netflix<span>Light</span></div>
  <a href="index.html">← Retour</a>
</div>

<div class="profile-page">

  <!-- ─── INFOS UTILISATEUR ────────────────────────── -->
  <div class="profile-header">
    <div class="profile-avatar" id="profile-avatar">🎬</div>
    <div class="profile-info">
      <h1 id="profile-pseudo">Pseudo</h1>
      <p id="profile-email">email@example.com</p>
      <p>Membre depuis le <span id="profile-date">—</span></p>
    </div>
  </div>

  <!-- ─── STATISTIQUES ─────────────────────────────── -->
  <div class="profile-stats">
    <div class="stat-card">
      <span id="stat-favoris">0</span>
      <span>Favoris</span>
    </div>
  </div>

  <!-- ─── MODIFIER LE PROFIL ───────────────────────── -->
  <div class="profile-section">
    <h2>Modifier le profil</h2>
    <div class="profile-form">

      <!-- Changer le pseudo -->
      <label>Nouveau pseudo</label>
      <input type="text" id="input-pseudo" placeholder="Nouveau pseudo">

      <!-- Choisir un avatar -->
      <label>Choisir un avatar</label>
      <div id="avatar-choices-profile" class="avatar-choices-row">
        <span class="avatar-choice" data-avatar="🎬">🎬</span>
        <span class="avatar-choice" data-avatar="🎭">🎭</span>
        <span class="avatar-choice" data-avatar="🍿">🍿</span>
        <span class="avatar-choice" data-avatar="🎥">🎥</span>
        <span class="avatar-choice" data-avatar="⭐">⭐</span>
        <span class="avatar-choice" data-avatar="🏆">🏆</span>
        <span class="avatar-choice" data-avatar="🎞️">🎞️</span>
        <span class="avatar-choice" data-avatar="👁️">👁️</span>
      </div>

      <button id="save-profile-btn">Sauvegarder</button>
      <p id="profile-message"></p>
    </div>
  </div>

  <!-- ─── CHANGER LE MOT DE PASSE ──────────────────── -->
  <div class="profile-section">
    <h2>Changer le mot de passe</h2>
    <div class="profile-form">
      <label>Ancien mot de passe</label>
      <input type="password" id="input-old-password" placeholder="Ancien mot de passe">
      <label>Nouveau mot de passe</label>
      <input type="password" id="input-new-password" placeholder="Nouveau mot de passe">
      <button id="save-password-btn">Changer le mot de passe</button>
      <p id="password-message"></p>
    </div>
  </div>

  <!-- ─── COULEUR DU SITE ───────────────────────────── -->
  <div class="profile-section">
    <h2>Couleur du site</h2>
    <div class="profile-form">
      <label>Choisir une couleur</label>
      <div class="color-choices">
        <div class="color-choice" data-color="#e50914" style="background:#e50914;" title="Rouge"></div>
        <div class="color-choice" data-color="#0084ff" style="background:#0084ff;" title="Bleu"></div>
        <div class="color-choice" data-color="#00c853" style="background:#00c853;" title="Vert"></div>
        <div class="color-choice" data-color="#ff6d00" style="background:#ff6d00;" title="Orange"></div>
        <div class="color-choice" data-color="#aa00ff" style="background:#aa00ff;" title="Violet"></div>
        <div class="color-choice" data-color="#ffd600" style="background:#ffd600;" title="Or"></div>
      </div>
      <button id="save-color-btn">Appliquer</button>
      <p id="color-message"></p>
    </div>
  </div>

  <!-- ─── SUPPRIMER LE COMPTE ──────────────────────── -->
  <div class="profile-section">
    <h2 style="color:#ff4444;">Supprimer le compte</h2>
    <div class="profile-form">
      <p>Cette action est irréversible. Toutes vos données seront supprimées.</p>
      <button id="delete-account-btn">Supprimer mon compte</button>
      <p id="delete-message"></p>
    </div>
  </div>

</div>

<!-- ─── SCRIPT ──────────────────────────────────────── -->
<script src="js/profile.js"></script>

</body>
</html>

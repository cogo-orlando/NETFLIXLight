<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Profil</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<!-- ─── BARRE DE NAVIGATION ─────────────────────────── -->
<div class="topbar">
  <div class="topbar-logo">Netflix<span>Light</span></div>
  <a href="index.html">← Retour</a>
</div>

<div class="profile-page">

  <!-- ─── INFOS UTILISATEUR ────────────────────────── -->
  <div class="profile-header">
    <div class="profile-avatar" id="profile-avatar">🎬</div>
    <div class="profile-info">
      <h1 id="profile-pseudo">Pseudo</h1>
      <p id="profile-email">email@example.com</p>
      <p>Membre depuis le <span id="profile-date">—</span></p>
    </div>
  </div>

  <!-- ─── STATISTIQUES ─────────────────────────────── -->
  <div class="profile-stats">
    <div class="stat-card">
      <span id="stat-favoris">0</span>
      <span>Favoris</span>
    </div>
  </div>

</div>

<!-- ─── SCRIPT ──────────────────────────────────────── -->
<script src="js/profile.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Netflix Light</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ─── BARRE DE NAVIGATION ──── -->
<div class="topbar">

    <!-- Logo cliquable qui ramène à l'accueil -->
    <a href="/" class="topbar-logo">Netflix<span>Light</span></a>

    <!-- Boutons de navigation -->
    <div id="auth-buttons">

        <!-- Affiché quand l'utilisateur est connecté -->
        <a id="user-profile-link" href="profile.html" class="hidden">Mon profil</a>
        <span class="sep">|</span>
        <button id="logout-btn" class="btn-logout hidden">Déconnexion</button>
        <span class="sep">|</span>

        <!-- Toujours visible -->
        <a href="login.html">Login</a>
        <span class="sep">|</span>
        <a href="signup.html">Sign up</a>
        <span class="sep">|</span>
        <a href="favorites.html">Favorites</a>

    </div>
</div>

<!-- ─── BANNIÈRE PRINCIPALE ───── -->
<div id="hero-banner" class="hero-banner">

    <!-- Image de fond du film -->
    <div class="hero-backdrop" id="hero-backdrop"></div>

    <!-- Flèches pour naviguer entre les films -->
    <button class="hero-arrow hero-arrow-left" id="hero-prev">&#8592;</button>
    <button class="hero-arrow hero-arrow-right" id="hero-next">&#8594;</button>

    <!-- Infos du film -->
    <div class="hero-content">
        <p class="hero-tag">TENDANCE</p>
        <h1 class="hero-film-title" id="hero-film-title"></h1>
        <p class="hero-synopsis" id="hero-synopsis"></p>
        <div class="hero-meta" id="hero-meta"></div>

        <!-- Boutons d'action -->
        <div class="hero-btns">
            <a class="hero-btn-play" id="hero-btn-play" href="#">▶ Voir le film</a>
            <button class="hero-btn-fav" id="hero-btn-fav">+ Ma liste</button>
        </div>
    </div>

    <!-- Points de navigation -->
    <div class="hero-dots" id="hero-dots"></div>

</div>

<!-- ─── BARRE DE RECHERCHE ────── -->
<div class="search-bar-section">
    <input type="text" id="fav-search" class="fav-search" placeholder="Search for a movie...">
</div>

<!-- ─── LISTE DES FILMS ───── -->
<!-- Rempli automatiquement par main.js -->
<div id="films-container"></div>

<!-- ─── SCRIPTS ─── -->
<script src="js/main.js"></script>
<script src="js/authentification.js"></script>

</body>
</html>

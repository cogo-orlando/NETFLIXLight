<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NetflixLight — Erreur</title>
  <link rel="stylesheet" href="css/error.css">
</head>
<body>

<!-- Page d'erreur -->
<div class="error-page">

  <!-- Logo -->
  <div class="error-logo">Netflix<span>Light</span></div>

  <!-- Code d'erreur (404, 500...) -->
  <div class="error-screen">
    <p class="error-code" id="error-code">404</p>
  </div>

  <!-- Message d'erreur -->
  <h1 class="error-title" id="error-title">Page introuvable</h1>
  <p class="error-message" id="error-message">
    Ce contenu n'est pas disponible sur NetflixLight.
  </p>

  <!-- Bouton retour -->
  <a href="index.html" class="error-btn">⬅ Retour à l'accueil</a>

</div>

<!-- Script -->
<script>
  // Récupère le code d'erreur dans l'URL
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  // Affiche le bon message selon le code d'erreur
  if (code) document.getElementById("error-code").textContent = code;

  if (code === "500") {
    document.getElementById("error-title").textContent = "Erreur serveur";
    document.getElementById("error-message").textContent = "Une erreur inattendue s'est produite.";
  }
  else if (code === "403") {
    document.getElementById("error-title").textContent = "Accès refusé";
    document.getElementById("error-message").textContent = "Vous n'avez pas la permission d'accéder à cette page.";
  }
  else if (code === "401") {
    document.getElementById("error-title").textContent = "Non autorisé";
    document.getElementById("error-message").textContent = "Vous devez être connecté pour accéder à cette page.";
  }

</script>

</body>
</html>

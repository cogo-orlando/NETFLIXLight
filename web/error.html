<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NetflixLight — Error</title>
  <link rel="stylesheet" href="css/error.css">
</head>
<body>

<!-- Page d'erreur -->
<div class="error-page">

  <div class="error-logo">Netflix<span>Light</span></div>

  <!-- Code d'erreur 404 -->
  <div class="error-screen">
    <p class="error-code" id="error-code">404</p>
  </div>

  <!-- Message d'erreur -->
  <h1 class="error-title" id="error-title">Page not found</h1>
  <p class="error-message" id="error-message">
    This content is not available on NetflixLight.
  </p>

  <!-- Bouton retour -->
  <a href="index.html" class="error-btn">⬅ Return to homepage</a>

</div>

<!-- Script -->
<script>

  // Récupère le code d'erreur dans l'URL
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  // Affiche le bon message selon le code d'erreur
  if (code) document.getElementById("error-code").textContent = code;

  if (code === "500") {
    document.getElementById("error-title").textContent = "Server error";
    document.getElementById("error-message").textContent = "An unexpected error has occurred.";
  }
  else if (code === "403") {
    document.getElementById("error-title").textContent = "Access denied";
    document.getElementById("error-message").textContent = "You do not have permission to access this page.";
  }
  else if (code === "401") {
    document.getElementById("error-title").textContent = "Not allowed";
    document.getElementById("error-message").textContent = "You must be logged in to access this page.";
  }

</script>

</body>
</html>
